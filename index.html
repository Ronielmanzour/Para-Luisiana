<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Princesa Luisiana 🙃</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #020108; font-family: 'Montserrat', sans-serif; color: #fff;
            user-select: none; cursor: grab; touch-action: none;
        }
        body:active { cursor: grabbing; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* PANTALLA 1: BIENVENIDA */
        #screen-welcome {
            position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
            background: radial-gradient(circle, rgba(10, 5, 22, 0.98) 0%, rgba(2, 1, 8, 1) 100%);
            transition: opacity 0.8s ease; padding: 20px;
        }
        .welcome-container { position: relative; margin-bottom: 30px; text-align: center; width: 100%; max-width: 400px; }
        .cosmos-glow {
            position: absolute; width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(211, 10, 167, 0.4) 0%, transparent 65%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%;
            animation: haloHeartbeat 4s infinite ease-in-out; will-change: transform, opacity;
        }
        @media(min-width: 768px) { .cosmos-glow { width: 420px; height: 420px; } }
        .name-title {
            font-family: 'Dancing Script', cursive; font-size: 55px; color: #fff;
            text-shadow: 0 0 15px #f33154, 0 0 30px #8310cf; margin: 0; position: relative; z-index: 12;
        }
        @media(min-width: 768px) { .name-title { font-size: 80px; } }
        .initials-orbit { position: absolute; top: 50%; left: 50%; width: 180px; height: 180px; transform: translate(-50%, -50%); z-index: 11; }
        @media(min-width: 768px) { .initials-orbit { width: 240px; height: 240px; } }
        .initials-orbit span {
            font-family: 'Dancing Script', cursive; font-size: 16px; color: rgba(255, 255, 255, 0.75); 
            position: absolute; animation: initialsOrbit 16s linear infinite; will-change: transform;
        }
        .initials-orbit span:nth-child(1) { --i:1; top: 0; left: 50%; }
        .initials-orbit span:nth-child(2) { --i:2; top: 20%; left: 80%; animation-delay: -3.2s; }
        .initials-orbit span:nth-child(3) { --i:3; top: 80%; left: 80%; animation-delay: -6.4s; }
        .initials-orbit span:nth-child(4) { --i:4; top: 100%; left: 50%; animation-delay: -9.6s; }
        .initials-orbit span:nth-child(5) { --i:5; top: 50%; left: 0; animation-delay: -12.8s; }
        .signature { font-weight: 300; font-size: 13px; color: rgba(255, 255, 255, 0.55); margin: 5px 0 35px 0; letter-spacing: 3px; }
        .btn-enter {
            padding: 14px 45px; font-size: 16px; font-weight: 600; color: #fff; background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(199, 125, 255, 0.5); border-radius: 40px; cursor: pointer; backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); box-shadow: 0 0 20px rgba(114, 9, 183, 0.3); letter-spacing: 3px; transition: all 0.25s ease;
        }
        .btn-enter:hover, .btn-enter:active { transform: scale(1.05); background: rgba(199, 125, 255, 0.18); box-shadow: 0 0 25px #ff758f; border-color: #fff; }

        /* MODALES */
        .password-modal, .error-modal, .poem-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 85%; max-width: 340px; background: rgba(10, 5, 25, 0.98); border: 2px solid #b9465b;
            padding: 25px 20px; border-radius: 24px; box-shadow: 0 0 35px rgba(204, 6, 42, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 105; text-align: center;
            opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform, opacity;
        }
        .password-modal.active, .error-modal.active, .poem-modal.active { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
        .password-modal h4 { margin: 0 0 15px 0; font-size: 18px; color: #fff; }
        .password-modal input {
            width: 100%; padding: 12px; font-size: 16px; border-radius: 30px; border: 1px solid rgba(199, 125, 255, 0.5);
            background: rgba(255, 255, 255, 0.05); color: #fff; text-align: center; outline: none; margin-bottom: 20px;
        }
        .password-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-pass { padding: 10px 25px; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-pass-confirm { background: linear-gradient(45deg, #7209b7, #ff758f); color: white; }
        .btn-pass-cancel { background: rgba(255, 255, 255, 0.1); color: #ccc; }
        
        .error-modal { border-color: #ee3248; background: rgba(30, 5, 10, 0.98); z-index: 110; }
        .error-modal .emoji { font-size: 40px; margin-bottom: 10px; display: block; }
        .btn-error-close { background: #ef233c; border: none; color: white; padding: 8px 25px; border-radius: 15px; cursor: pointer; font-weight: 600; }

        /* PANTALLA 2: UNIVERSO INTERACTIVO */
        #screen-space { position: absolute; width: 100%; height: 100%; display: none; z-index: 5; opacity: 0; transition: opacity 1.5s ease-in; }
        #orbit-elements { position: absolute; width: 100%; height: 100%; z-index: 4; pointer-events: none; transform-style: preserve-3d; }
        .floating-item {
            position: absolute; left: 50%; top: 50%; cursor: pointer; pointer-events: auto; 
            will-change: transform, opacity; -webkit-tap-highlight-color: transparent;
        }
        .card-photo {
            width: 85px; height: 105px; background: #fff; padding: 4px 4px 14px 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6); border-radius: 3px;
        }
        @media(min-width: 768px) { .card-photo { width: 110px; height: 130px; padding: 5px 5px 18px 5px; } }
        .card-photo img { width: 100%; height: 85%; object-fit: cover; }
        .card-text {
            background: rgba(20, 10, 35, 0.85); border: 1px solid rgba(255, 117, 143, 0.5);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); padding: 8px 14px;
            border-radius: 20px; font-size: 11px; font-weight: 600; color: #ffe5ec;
            white-space: nowrap; box-shadow: 0 5px 12px rgba(0,0,0,0.4);
        }
        @media(min-width: 768px) { .card-text { padding: 10px 20px; font-size: 13px; border-radius: 25px; } }

        #tap-instructions {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 13px; font-weight: 500; color: rgba(255, 255, 255, 0.75);
            text-shadow: 0 0 10px rgba(199, 125, 255, 0.8); z-index: 8; pointer-events: none;
            text-align: center; width: 90%; animation: pulseInstructions 2.5s infinite ease-in-out;
        }

        .poem-modal { max-width: 400px; border-color: rgba(163, 51, 248, 0.4); max-height: 80vh; overflow-y: auto; z-index: 100; }
        .poem-modal h3 { color: #ff758f; margin-top: 0; font-size: 20px; }
        .poem-modal p { font-size: 14px; line-height: 1.6; color: #e0aaff; font-style: italic; white-space: pre-line; margin-bottom: 20px; }
        .close-btn { background: linear-gradient(45deg, #7209b7, #ff758f); border: none; padding: 10px 30px; color: white; border-radius: 20px; cursor: pointer; font-weight: 600; }

        @keyframes haloHeartbeat {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
        }
        @keyframes initialsOrbit {
            0% { transform: rotate(0deg) translateX(var(--orbit-radius, 85px)) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(var(--orbit-radius, 85px)) rotate(-360deg); }
        }
        @keyframes pulseInstructions {
            0%, 100% { opacity: 0.45; transform: translateX(-50%) scale(0.98); }
            50% { opacity: 0.95; transform: translateX(-50%) scale(1.02); }
        }
    </style>
</head>
<body>

    <canvas id="universeCanvas"></canvas>

    <div id="screen-welcome">
        <div class="welcome-container">
            <div class="cosmos-glow"></div>
            <h1 class="name-title">Luisiana</h1>
            <div class="initials-orbit">
                <span>RL</span> <span>LR</span> <span>RL</span> <span>RL</span> <span>LR</span>
            </div>
        </div>
        <p class="signature">De Roniel</p>
        <button class="btn-enter" onclick="showPasswordPrompt()">ABRIR 💫</button>
    </div>

    <div class="password-modal" id="passwordModal">
        <h4>Introduce la fecha especial 🔐</h4>
        <input type="password" id="passInput" placeholder="DDMMAAAA" maxlength="8">
        <div class="password-buttons">
            <button class="btn-pass btn-pass-cancel" onclick="closePasswordPrompt()">Cancelar</button>
            <button class="btn-pass btn-pass-confirm" onclick="verifyPassword()">Ingresar</button>
        </div>
    </div>

    <div class="error-modal" id="errorModal">
        <span class="emoji">😡</span>
        <p>¡amorshh esa ño ser la fecha!</p>
        <button class="btn-error-close" onclick="closeErrorModal()">Intentar de nuevo</button>
    </div>

    <div id="screen-space">
        <div class="orbit-container" id="orbit-elements"></div>
        <div id="tap-instructions">✨ Toca cualquier texto o imagen ✨</div>
    </div>

    <div class="poem-modal" id="poemModal">
        <h3 id="modalTitle">Nuestro aniversario 💙</h3>
        <p id="modalText">Cargando poema...</p>
        <button class="close-btn" onclick="closeModal()">Cerrar ⭐</button>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="MILO J M.A.I .mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('universeCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let stars = [];
        let heartParticles = [];
        let ringParticles = [];
        let sparkleParticles = []; 
        let backgroundStars = []; 
        let galaxyFormation = false;
        
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationX = 0.3, rotationY = 0;
        let velocityX = 0, velocityY = 0;
        let currentZoom = 1.0;
        const maxZoom = 1.8, minZoom = 0.8;

        function getAdaptiveRadius() { return window.innerWidth < 768 ? 160 : 380; }

        let resizeTimeout;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            const rootRadius = window.innerWidth < 768 ? "85px" : "115px";
            document.documentElement.style.setProperty('--orbit-radius', rootRadius);
        }
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resize, 150);
        });
        resize();

        // Control de arrastre optimizado para móvil y PC
        function pointerDown(x, y) {
            isDragging = true;
            previousMousePosition = { x, y };
        }
        function pointerMove(x, y) {
            if (!isDragging || !galaxyFormation) return;
            const deltaX = x - previousMousePosition.x;
            const deltaY = y - previousMousePosition.y;

            velocityY = deltaX * 0.0015;
            velocityX = deltaY * 0.0015;
            rotationY += velocityY;
            rotationX += velocityX;

            previousMousePosition = { x, y };
        }

        window.addEventListener('mousedown', (e) => pointerDown(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => pointerMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('wheel', (e) => {
            if (!galaxyFormation) return;
            currentZoom += e.deltaY * -0.0008;
            currentZoom = Math.max(minZoom, Math.min(maxZoom, currentZoom));
        }, { passive: true });

        let initialDist = null;
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 0) return;
            if (e.touches.length === 2) {
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                initialDist = Math.sqrt(dx * dx + dy * dy);
            } else {
                pointerDown(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!galaxyFormation || e.touches.length === 0) return;
            if (e.touches.length === 2 && initialDist !== null) {
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                let newDist = Math.sqrt(dx * dx + dy * dy);
                currentZoom += (newDist / initialDist - 1) * 0.3;
                currentZoom = Math.max(minZoom, Math.min(maxZoom, currentZoom));
                initialDist = newDist;
            } else if (e.touches.length === 1) {
                pointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('touchend', () => { isDragging = false; initialDist = null; });

        class Vector3 {
            constructor(x, y, z) { this.x = x; this.y = y; this.z = z; }
            rotate(angleX, angleY) {
                let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
                let x1 = this.x * cosY - this.z * sinY;
                let z1 = this.x * sinY + this.z * cosY;
                let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
                return new Vector3(x1, this.y * cosX - z1 * sinX, this.y * sinX + z1 * cosX);
            }
            project() {
                let fov = (window.innerWidth < 768 ? 350 : 550) / currentZoom;
                let perspective = fov / (fov + this.z);
                return { x: width / 2 + this.x * perspective, y: height / 2 + this.y * perspective, scale: perspective, zIndex: Math.round(this.z) };
            }
        }

        class Particle {
            constructor(type = 'star') {
                this.type = type;
                this.reset();
            }
            reset() {
                this.opacity = Math.random() * 0.5 + 0.4;
                if (this.type === 'heart') {
                    this.color = Math.random() > 0.3 ? '#ff003c' : '#f11e48';
                    this.size = Math.random() * 1.5 + 0.8;
                    let scaleHeart = window.innerWidth < 768 ? 8 : 15;
                    let t = Math.random() * Math.PI * 2;
                    let x = 16 * Math.pow(Math.sin(t), 3) * scaleHeart;
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scaleHeart;
                    this.pos = new Vector3(x, y, (Math.random() - 0.5) * 50);
                } 
                else if (this.type === 'ring') {
                    this.color = Math.random() > 0.45 ? '#ffe5ec' : '#c77dff';
                    this.size = Math.random() * 1.2 + 0.4;
                    let angle = Math.random() * Math.PI * 2;
                    let radius = Math.random() * 30 + (getAdaptiveRadius() - 15); 
                    this.pos = new Vector3(Math.cos(angle) * radius, (Math.random()-0.5)*15, Math.sin(angle) * radius);
                }
                else if (this.type === 'sparkle') {
                    this.color = '#ffffff';
                    this.size = Math.random() * 1.8 + 1.0;
                    let angle = Math.random() * Math.PI * 2;
                    let radius = Math.random() * (getAdaptiveRadius() + 40); 
                    this.pos = new Vector3(Math.cos(angle) * radius, (Math.random() - 0.5) * 120, Math.sin(angle) * radius);
                }
                else {
                    this.color = '#fff'; this.size = Math.random() * 1.0 + 0.3;
                    this.pos = new Vector3((Math.random()-0.5)*width*2, (Math.random()-0.5)*height*2, (Math.random()-0.5)*800);
                }
            }
            draw(proj) {
                if (proj.scale < 0) return;
                ctx.globalAlpha = this.opacity * proj.scale;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                let calcSize = this.size * proj.scale * currentZoom;
                ctx.arc(proj.x, proj.y, calcSize < 0.1 ? 0.1 : calcSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // CANTIDADES DE PARTÍCULAS OPTIMIZADAS PARA GAMA BAJA (Fluidez asegurada)
        const isMobile = window.innerWidth < 768;
        const maxStars = isMobile ? 120 : 250;
        const maxHearts = isMobile ? 250 : 500;
        const maxRings = isMobile ? 200 : 400;
        const maxSparkles = isMobile ? 40 : 90;

        for(let i=0; i<maxStars; i++) stars.push(new Particle('star'));
        for(let i=0; i<maxHearts; i++) heartParticles.push(new Particle('heart')); 
        for(let i=0; i<maxRings; i++) ringParticles.push(new Particle('ring'));
        for(let i=0; i<maxSparkles; i++) sparkleParticles.push(new Particle('sparkle')); 

        for(let i=0; i<(isMobile ? 60 : 120); i++) {
            backgroundStars.push({
                x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
                size: Math.random() * 0.8 + 0.2, opacity: Math.random() * 0.5 + 0.3
            });
        }

        function animate() {
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);
            
            ctx.fillStyle = '#ffffff';
            for(let i=0; i<backgroundStars.length; i++) {
                let s = backgroundStars[i];
                ctx.globalAlpha = s.opacity;
                ctx.fillRect(s.x, s.y, s.size, s.size); // Cambiado a fillRect para optimizar rendimiento de dibujado base
            }

            if (!isDragging) {
                rotationY += velocityY; rotationX += velocityX;
                velocityY *= 0.95; velocityX *= 0.95;
                rotationY += 0.0012; rotationX += 0.0004;
            }

            let allObjects = [];

            if (!galaxyFormation) {
                stars.forEach(s => {
                    s.pos.y -= 0.3;
                    if (s.pos.y < -height) s.pos.y = height;
                    allObjects.push({obj: s, proj: s.pos.project()});
                });
            } else {
                let cX3d = rotationX * 0.3, cY3d = rotationY * 0.3;
                stars.forEach(s => allObjects.push({obj: s, proj: s.pos.rotate(cX3d, cY3d).project()}));
                heartParticles.forEach(p => allObjects.push({obj: p, proj: p.pos.rotate(rotationX, rotationY).project()}));
                ringParticles.forEach(p => allObjects.push({obj: p, proj: p.pos.rotate(rotationX, rotationY).project()}));
                sparkleParticles.forEach(sp => allObjects.push({obj: sp, proj: sp.pos.rotate(rotationX, rotationY).project()}));
            }

            allObjects.sort((a, b) => b.proj.zIndex - a.proj.zIndex);
            for(let i=0; i<allObjects.length; i++) {
                allObjects[i].obj.draw(allObjects[i].proj);
            }
            
            if(galaxyFormation) updateOrbit3D();
            requestAnimationFrame(animate);
        }
        animate();

        const itemsData = [
            { type: 'photo', src: 'foto1.jpg', title: 'Mi lokita ', text: 'En el vasto universo de mi vida,\ntu luz es la estrella que me guía.\nGracias por estar siempre para mí,\nen las buenas y las malas mi niña.' },
            { type: 'text', content: 'Te amo 💙', title: 'Mi Amor', text: 'Eres lo más bonito de mis días, Mi niña. Cada momento contigo vale más que todo el universo.' },
            { type: 'photo', src: 'foto2.jpg', title: 'Mi Lugar Favorito 🌌', text: 'Mi lugar favorito en el mundo siempre será a tu lado, sin importar el espacio, el lugar ni el tiempo. Solo con estar contigo soy feliz.' },
            { type: 'text', content: 'Mi niña peshosha ✨', title: 'Para Mi niña', text: 'Gracias por tus sonrisas, tus abrazos, tu cariño sin comparación, tu tiempo y dedicación, y por haber llegado a mi vida.' },
            { type: 'photo', src: 'InShot_20260715_011614496.jpg', title: 'Unidos por un hilo rojo', text: 'Cuenta una leyenda que hay un hilo rojo que tenemos todos, que aunque no podemos ver, nos conecta a otro ser.' },
            { type: 'text', content: 'Te quiero mucho 🥰', title: '4life', text: 'Un infinito no bastaría para demostrarte todo lo que siento por ti mi princesa' },
            { type: 'text', content: 'Mi vida ♾️', title: 'Amor de mi vida', text: 'Eres el centro de mi galaxia.\nTu amor me inspira cada día.\nNo importa dónde esté siempre estaré para ti.' },
            { type: 'text', content: 'Mi cielo ✨', title: 'Siempre juntos', text: 'Tú y yo, escribiendo nuestra propia historia.\nPor muchos más meses y años.\nMi cielo' },
            { type: 'text', content: 'Mi reina 👑', title: 'reina mi corazón', text: 'sos la dueña de mi corazon.\nTu sonrisa me ilumina el alma.\ny tus abrasos me llena el ser ya que tu eres esa personaita tan especial en mi vida que nuca espero que dejes de ser' },
            { type: 'text', content: 'Mi princesa 👸', title: 'Te voy amar', text: ' Te voy amar cada dia de mi vida, entre sonrisas, entre llantos, te voy amar en dias buenos pero tambien te amare mucho mas en tus dias malos sin importar que.\nTe voy amar porque te has vuelto en alguien tan importante para mi' }
        ];

        const floatingElements = [];

        function createFloatingUniverse() {
            const container = document.getElementById('orbit-elements');
            const radius = getAdaptiveRadius();
            
            itemsData.forEach((data, index) => {
                const div = document.createElement('div');
                div.classList.add('floating-item');
                
                if(data.type === 'photo') {
                    div.innerHTML = `<div class="card-photo"><img src="${data.src}" alt="photo" loading="lazy"></div>`;
                } else {
                    div.innerHTML = `<div class="card-text">${data.content}</div>`;
                }

                div.onclick = () => openPoem(data.title, data.text);
                div.addEventListener('touchend', (e) => {
                    if(!isDragging) { e.preventDefault(); openPoem(data.title, data.text); }
                });

                container.appendChild(div);
                
                let angle = (index / itemsData.length) * Math.PI * 2;
                let heightSpread = isMobile ? 40 : 100;
                floatingElements.push({
                    element: div,
                    pos: new Vector3(Math.cos(angle) * radius, (Math.random()-0.5)*heightSpread, Math.sin(angle) * radius)
                });
            });
        }

        function updateOrbit3D() {
            for(let i=0; i<floatingElements.length; i++) {
                let item = floatingElements[i];
                let rotated = item.pos.rotate(rotationX, rotationY);
                let proj = rotated.project();
                
                // Optimización crítica: translate3d activa la aceleración por hardware GPU
                item.element.style.transform = `translate3d(calc(-50% + ${rotated.x * proj.scale}px), calc(-50% + ${rotated.y * proj.scale}px), 0) scale(${proj.scale * currentZoom})`;
                item.element.style.opacity = proj.scale * 1.3;
                item.element.style.zIndex = proj.zIndex;
                
                if (proj.scale < 0.18) item.element.style.display = 'none';
                else item.element.style.display = 'block';
            }
        }

        function showPasswordPrompt() {
            document.getElementById('passwordModal').classList.add('active');
            const input = document.getElementById('passInput');
            input.value = ''; input.focus();
        }
        function closePasswordPrompt() { document.getElementById('passwordModal').classList.remove('active'); }
        function closeErrorModal() {
            document.getElementById('errorModal').classList.remove('active');
            const input = document.getElementById('passInput');
            input.value = ''; input.focus();
        }

        function verifyPassword() {
            if (document.getElementById('passInput').value === '17112025') {
                closePasswordPrompt(); enterCosmos();
            } else {
                document.getElementById('errorModal').classList.add('active');
            }
        }

        function enterCosmos() {
            const welcome = document.getElementById('screen-welcome');
            const spaceScreen = document.getElementById('screen-space');
            const music = document.getElementById('bg-music');

            galaxyFormation = true;
            
            if(music) {
                music.play().catch(() => {
                    const startAudio = () => { music.play(); };
                    document.addEventListener('click', startAudio, { once: true });
                    document.addEventListener('touchstart', startAudio, { once: true });
                });
            }

            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                spaceScreen.style.display = 'block';
                createFloatingUniverse();
                setTimeout(() => spaceScreen.style.opacity = '1', 50);
            }, 850);
        }

        function openPoem(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('poemModal').classList.add('active');
        }
        function closeModal() { document.getElementById('poemModal').classList.remove('active'); }
    </script>
</body>
</html>
